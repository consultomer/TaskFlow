version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow
    ports:
      - "5001:5001"
    volumes:
      - db_data:/app/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db_data:
    driver: local
