# Nginx configuration for example.com
# Place this in /etc/nginx/sites-available/taskflow

server {
    listen 80;
    server_name example.com www.example.com;

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Static files (optional - if you want Nginx to serve them directly)
    location /static {
        alias /path/to/TaskFlow/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

